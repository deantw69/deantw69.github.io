<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>deantw69</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2f7d4f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --border: #262b36;
        --accent: #4caf7c;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", sans-serif;
      line-height: 1.6;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
    }
    .logo {
      font-size: 44px;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 24px;
    }
    p.sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 15px;
    }
    .apps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    a.app {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--fg);
      transition: border-color .15s, transform .15s;
    }
    a.app:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    a.app .emoji { font-size: 26px; }
    a.app .name { font-weight: 600; }
    a.app .desc { color: var(--muted); font-size: 13px; }
    .demo {
      margin-top: 28px;
      text-align: left;
    }
    .demo h2 {
      margin: 0 0 4px;
      font-size: 16px;
    }
    .demo p.hint {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
    }
    .videos {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 460px) {
      .videos { grid-template-columns: 1fr; }
    }
    .video {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }
    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    footer {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🍄</div>
    <h1>deantw69</h1>
    <p class="sub">獨立 App 開發者</p>

    <div class="apps">
      <a class="app" href="https://apps.apple.com/tw/app/id6788691811" target="_blank" rel="noopener">
        <span class="emoji">🍄</span>
        <span>
          <div class="name">搶菇助手</div>
          <div class="desc">讓倒數住進動態島，離開 App 也不漏接</div>
        </span>
      </a>
    </div>

    <section class="demo">
      <h2>設定示範</h2>
      <p class="hint">跟著影片一步步設定，讓倒數住進動態島。</p>
      <div class="videos">
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/jO79i1jF8PU"
            title="搶菇助手 設定示範 1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen></iframe>
        </div>
        <div class="video">
          <iframe
            src="https://www.youtube.com/embed/aFyRNmQUuKw"
            title="搶菇助手 設定示範 2"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen></iframe>
        </div>
      </div>
    </section>

    <footer>
      <a href="https://deantw69.github.io/mushroom_privacy/">隱私權政策</a>
    </footer>
  </main>
</body>
</html>
